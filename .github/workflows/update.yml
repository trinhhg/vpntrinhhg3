name: Update VPN Subs Automatically

on:
  schedule:
    # Chạy đúng 1 lần/ngày vào lúc 00:00 UTC (7h sáng VN - lúc Cloudflare vừa reset quota)
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-subs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests pyyaml

      - name: Run Script
        run: python update_sub.py
